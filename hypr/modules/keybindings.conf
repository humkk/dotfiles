###################
### KEYBINDINGS ###
###################

# Tecla modificadora principal (Windows/Super)
$mainMod = SUPER

# ── Aplicativos ─────────────────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal        # Abre o terminal
bind = $mainMod, C, killactive,            # Fecha a janela ativa
bind = $mainMod, E, exec, $fileManager     # Abre o gerenciador de arquivos
bind = $mainMod, R, exec, $menu            # Abre o launcher (rofi)
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh  # Wallpaper picker
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Sair do Hyprland

# ── Janelas ─────────────────────────────────────────────────────────────────
bind = $mainMod, V, togglefloating,        # Alternar janela flutuante
bind = $mainMod, P, pseudo,                # Pseudotile (dwindle)
bind = $mainMod, J, layoutmsg, togglesplit # Alternar split (dwindle)
bind = $mainMod, F, fullscreen, 0          # Fullscreen

# ── Foco ────────────────────────────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l       # Foco para esquerda
bind = $mainMod, right, movefocus, r       # Foco para direita
bind = $mainMod, up,    movefocus, u       # Foco para cima
bind = $mainMod, down,  movefocus, d       # Foco para baixo

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Mover janela para workspace ──────────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scratchpad (workspace especial) ─────────────────────────────────────────
bind = $mainMod, S, togglespecialworkspace, magic         # Mostrar/ocultar scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:magic  # Mover janela pro scratchpad

# ── Scroll entre workspaces com mouse ────────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Mover e redimensionar janelas com mouse ───────────────────────────────────
bindm = $mainMod, mouse:272, movewindow    # Super + clique esquerdo = mover
bindm = $mainMod, mouse:273, resizewindow  # Super + clique direito = redimensionar

# ── Screenshot ───────────────────────────────────────────────────────────────
bind = CTRL SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy  # Seleciona área e copia pro clipboard

# ── Volume ───────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+  # Volume +
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-        # Volume -
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle       # Mudo
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle     # Mudo microfone

# ── Brilho ───────────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+  # Brilho +
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-  # Brilho -

# ── Mídia ────────────────────────────────────────────────────────────────────
bindl = , XF86AudioNext,  exec, playerctl next          # Próxima música
bindl = , XF86AudioPause, exec, playerctl play-pause    # Pausar/reproduzir
bindl = , XF86AudioPlay,  exec, playerctl play-pause    # Pausar/reproduzir
bindl = , XF86AudioPrev,  exec, playerctl previous      # Música anterior